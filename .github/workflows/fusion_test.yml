name: Fusion Logger Test

on:
  workflow_dispatch: # Allows us to run it manually right now

jobs:
  test-logger:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Heavy Dependencies
        run: |
          pip install gspread pytz

      - name: Generate Secure Google Key
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          echo "$GCP_CREDENTIALS" > credentials.json

      - name: Run Fusion Logger
        run: python fusion_logger.py
        
