name: Performance Grader

on:
  schedule:
    # Every night 6:00 PM UTC = 11:30 PM IST
    # Runs after market close. Grades all trades from the day.
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  run-grader:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install \
            pyTelegramBotAPI \
            requests \
            supabase \
            yfinance \
            pandas \
            pytz

      - name: Run Performance Grader
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          ERROR_BOT_TOKEN:   ${{ secrets.ERROR_BOT_TOKEN }}
          ERROR_CHAT_ID:     ${{ secrets.ERROR_CHAT_ID }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
        run: python performance_grader.py
