name: AI Sentiment Scanner

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    
    # Give the bot permission to push state changes to the repository
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Advanced Architecture Dependencies
        run: |
          pip install pyTelegramBotAPI requests feedparser supabase fuzzywuzzy python-Levenshtein gnews snscrape

      - name: Run Sentiment Scanner Pipeline
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
        run: python sentiment_scanner.py

      - name: Save Bot Memory (State)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Check for the newly named v5.0 state file
          if [ -f scanner_state.json ]; then
            git add scanner_state.json
            git commit -m "Automated state update" || echo "No state changes to commit"
            git push || echo "Push failed, likely no changes."
          else
            echo "Market quiet: No scanner_state.json generated this run."
          fi
