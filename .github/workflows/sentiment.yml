name: AI Sentiment Scanner

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    
    # Give the bot permission to push changes to the repository
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pyTelegramBotAPI requests feedparser

      - name: Run Sentiment Scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python sentiment_scanner.py

      - name: Save Bot Memory (State)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Check if the state file exists before trying to save it
          if [ -f state.json ]; then
            git add state.json
            git commit -m "Automated state update" || echo "No state changes to commit"
            git push || echo "Push failed, likely no changes."
          else
            echo "Market quiet: No state.json generated this run."
          fi
          
